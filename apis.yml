aid: ckan-publishing-service-gov-uk
name: data.gov.uk CKAN Publishing Service
description: >-
  data.gov.uk CKAN Publishing Service is a national government open-data portal for United Kingdom running CKAN.
  It exposes the CKAN catalog API, a standardized machine-readable interface over approximately 57,757 datasets,
  supporting programmatic dataset search, metadata retrieval, and resource access. Because it runs CKAN, it shares a
  consistent API surface with every other CKAN portal, making it uniformly harvestable and integrable.
