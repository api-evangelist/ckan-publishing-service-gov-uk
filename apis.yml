apis:
  - aid: ckan-publishing-service-gov-uk:catalog
    name: data.gov.uk CKAN Publishing Service CKAN Action API
    description: >-
      CKAN Action API for data.gov.uk CKAN Publishing Service, a consistent JSON-over-HTTP interface over a catalog of 57,757 datasets. Standard actions include package_search, package_show, package_list, organization_list, group_list, tag_list, and resource_search; datastore_search is available where the DataStore extension is enabled. Base URL https://ckan.publishing.service.gov.uk/api/3/action/.
    humanURL: https://ckan.publishing.service.gov.uk
    baseURL: https://ckan.publishing.service.gov.uk/api/3/action
